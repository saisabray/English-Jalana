<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English Jalana</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon" />
    <!-- Daisy Ui+Tailwind Css -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- Style -->
    <style>
      * {
        font-family: "Poppins", sans-serif;
      }
      .bangla-font {
        font-family: "Hind Siliguri", sans-serif;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="navbar bg-base-100 shadow-sm px-2 py-6 bg-[#BADEFF20] flex justify-between md:flex">
        <div class="navbar-start">
          <a class="btn btn-ghost text-xl"
            ><span class="font-bold">English</span
            ><img src="assets/logo.png" alt="" /><span
              class="font-semibold bangla-font"
              >জালানা</span
            ></a
          >
        </div>
        <div class="navbar-end space-x-4 hidden sm:flex  ">
          <button class="btn btn-primary btn-outline">
            <img src="assets/fa-circle-question.png" alt="" />
            FAQ
          </button>
          <button class="btn btn-primary btn-outline">
            <img src="assets/fa-book-open.png" alt="" />
            Learn
          </button>
          <button class="btn btn-primary btn-outline">
            <img src="assets/fa-arrow-right-from-bracket.png" alt="" />
            Logout
          </button>
        </div>
        <div class="navbar-m-end md:hidden">
          <div class="dropdown dropdown-left">
            <div tabindex="0" role="button" class="btn btn-ghost btn-circle">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h16M4 18h7"
                />
              </svg>
            </div>
            <ul
              tabindex="-1"
              class="menu menu-sm dropdown-content right-0 top-0 bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
            >
              <li><a>Homepage</a></li>
              <li><a>Portfolio</a></li>
              <li><a>About</a></li>
            </ul>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
